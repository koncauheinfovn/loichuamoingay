<div class="dn-lc-compact" id="dnLcCompact">
  <div class="dn-lc-top-grid">
    <section class="dn-lc-card dn-lc-readings-card" aria-labelledby="dnLcCompactTitle">
      <div class="dn-lc-card-head">
        <div class="dn-lc-title-wrap">
          <span class="dn-lc-kicker">LỜI CHÚA</span>
          <h2 id="dnLcCompactTitle">Lời Chúa hằng ngày</h2>
        </div>
        <div class="dn-lc-controls">
          <input type="date" id="dnLcDatePicker" aria-label="Chọn ngày" />
          <button type="button" id="dnLcTodayBtn">Hôm nay</button>
        </div>
      </div>

      <div class="dn-lc-actionbar" aria-label="Công cụ">
        <button type="button" id="dnLcCopyBtn">Copy</button>
        <button type="button" id="dnLcShareBtn">Chia sẻ</button>
        <button type="button" id="dnLcPrintBtn">In</button>
      </div>

      <div class="dn-lc-share-menu" id="dnLcShareMenu" aria-label="Chia sẻ mạng xã hội">
        <a id="dnShareFacebook" target="_blank" rel="noopener">Facebook</a>
        <a id="dnShareZalo" target="_blank" rel="noopener">Zalo</a>
        <a id="dnShareTelegram" target="_blank" rel="noopener">Telegram</a>
        <a id="dnShareX" target="_blank" rel="noopener">X</a>
        <a id="dnShareEmail">Email</a>
      </div>

      <div class="dn-lc-scroll" id="dnLcReadings" tabindex="0" aria-live="polite">
        <div class="dn-lc-state">Đang tải dữ liệu...</div>
      </div>
    </section>

    <section class="dn-lc-card dn-lc-calendar-card" aria-label="Lịch phụng vụ tháng">
      <div class="dn-lc-card-head dn-lc-calendar-head">
        <div class="dn-lc-title-wrap">
          <span class="dn-lc-kicker">PHỤNG VỤ</span>
          <h2>Lịch phụng vụ tháng</h2>
        </div>
      </div>

      <div class="dn-lc-monthbar">
        <button type="button" id="dnLcPrevMonth" class="dn-lc-month-btn" aria-label="Tháng trước">‹</button>
        <div id="dnLcMonthLabel" class="dn-lc-month-label">Tháng</div>
        <button type="button" id="dnLcNextMonth" class="dn-lc-month-btn" aria-label="Tháng sau">›</button>
      </div>

      <div class="dn-lc-weekdays" aria-hidden="true">
        <span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span><span>T7</span><span>CN</span>
      </div>
      <div class="dn-lc-days" id="dnLcCalendarDays"></div>
    </section>
  </div>

  <article class="dn-lc-feast-row" aria-live="polite">
    <div class="dn-lc-feast-image-wrap">
      <img id="dnLcFeastImg" class="dn-lc-feast-image" alt="Hình phụng vụ trong ngày" loading="lazy" />
    </div>
    <div class="dn-lc-feast-body">
      <div class="dn-lc-feast-date" id="dnLcFeastDate">Đang tải...</div>
      <h3 id="dnLcFeastTitle">Đang tải lịch phụng vụ...</h3>
      <div class="dn-lc-feast-meta">
        <span id="dnLcRankBadge">Bậc lễ</span>
        <span id="dnLcColorBadge">Màu lễ phục</span>
        <span id="dnLcSaintName">Lễ trong ngày</span>
      </div>
    </div>
  </article>
</div>

<script>
(function(){
  'use strict';

  var DN_LC_CONFIG = {
    API_BASE: 'https://TEN-WORKER-CUA-BAN.workers.dev',
    GITHUB_DATA_BASES: [
      'https://koncauheinfovn.github.io/loichuamoingay/data',
      'https://raw.githubusercontent.com/koncauheinfovn/loichuamoingay/main/data'
    ]
  };

  var MONTH_NAMES = ['Tháng 01','Tháng 02','Tháng 03','Tháng 04','Tháng 05','Tháng 06','Tháng 07','Tháng 08','Tháng 09','Tháng 10','Tháng 11','Tháng 12'];
  var yearCache = {};
  var selectedDate = startOfDay(new Date());
  var viewMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
  var latestRequest = 0;
  var currentDay = null;
  var currentSections = [];

  function $(id){ return document.getElementById(id); }
  function pad(n){ return String(n).padStart(2, '0'); }
  function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function formatDate(d){ return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
  function rawParseDate(value){ var m=String(value||'').match(/^(\d{4})-(\d{2})-(\d{2})$/); return m ? new Date(Number(m[1]), Number(m[2])-1, Number(m[3])) : startOfDay(new Date()); }
  function parseDate(value){ var m=String(value||'').match(/^(\d{4})-(\d{2})-(\d{2})$/); return m ? new Date(Number(m[1]),Number(m[2])-1,Number(m[3])) : startOfDay(new Date()); }
  function sameDate(a,b){ return a && b && formatDate(a) === formatDate(b); }

  function textFrom(value){
    if(value === null || value === undefined) return '';
    if(Array.isArray(value)) return value.map(textFrom).filter(Boolean).join('\n');
    if(typeof value === 'object') return textFrom(value.text || value.content || value.value || value.html || value.title || value.name || '');
    var str = String(value || '');
    if(/&/i.test(str)){ var ta=document.createElement('textarea'); for(var i=0;i<3;i++){ ta.innerHTML=str; if(ta.value===str)break; str=ta.value; } }
    return str.replace(/<script[\s\S]*?<\/script>/gi,' ').replace(/<style[\s\S]*?<\/style>/gi,' ').replace(/<[^>]+>/g,' ').replace(/[ \t]{2,}/g,' ').trim();
  }

  function isBlockedText(value){ return /Bản văn Kinh Thánh|Nhóm Phiên Dịch Các Giờ Kinh Phụng Vụ|ktcgkpv\.org|Gửi đi|In trang này|In$/i.test(textFrom(value)); }
  function safeUrl(url){ var u=String(url||'').trim(); return /^https:\/\//i.test(u)||/^data:image\//i.test(u)?u:''; }
  function setChildren(node,children){ while(node.firstChild)node.removeChild(node.firstChild); children.forEach(function(child){node.appendChild(child);}); }
  function makeEl(tag,className,text){ var el=document.createElement(tag); if(className)el.className=className; if(text!==undefined)el.textContent=text; return el; }
  function normalizeColor(value){ var c=textFrom(value).replace(/^màu\s+/i,'').trim(); var l=c.toLowerCase(); if(l.indexOf('trắng')>=0)return'Trắng'; if(l.indexOf('đỏ')>=0)return'Đỏ'; if(l.indexOf('xanh')>=0)return'Xanh'; if(l.indexOf('tím')>=0)return'Tím'; if(l.indexOf('hồng')>=0)return'Hồng'; return c||'Xanh'; }
  function normalizeRank(value){ var r=textFrom(value); var l=r.toLowerCase(); if(l.indexOf('lễ trọng')>=0)return'Lễ trọng'; if(l.indexOf('lễ kính')>=0)return'Lễ kính'; if(l.indexOf('lễ nhớ')>=0)return'Lễ nhớ'; if(l.indexOf('nhớ tự do')>=0)return'Lễ nhớ tự do'; if(l.indexOf('chúa nhật')>=0)return'Chúa nhật'; return r||'Lễ thường'; }

  function fetchJSON(url,timeout){ timeout=timeout||9000; var ctrl=typeof AbortController!=='undefined'?new AbortController():null; var timer=ctrl?setTimeout(function(){ctrl.abort();},timeout):null; return fetch(url,{signal:ctrl?ctrl.signal:undefined,cache:'no-cache'}).then(function(res){ if(timer)clearTimeout(timer); if(!res.ok)throw new Error('HTTP '+res.status); return res.json(); }); }
  function apiBase(){ return String(DN_LC_CONFIG.API_BASE||'').replace(/\/+$/,''); }
  function hasApi(){ return /^https:\/\//i.test(apiBase()) && apiBase().indexOf('TEN-WORKER-CUA-BAN') < 0; }

  function fetchDay(key){
    if(hasApi()) return fetchJSON(apiBase() + '/api/date/' + encodeURIComponent(key)).then(normalizeDay);
    return fetchDayFromGithub(key);
  }

  function fetchMonth(year, month){
    if(hasApi()) return fetchJSON(apiBase() + '/api/month?y=' + year + '&m=' + month).then(function(data){ return (data.days || []).map(normalizeDay).filter(Boolean); });
    return fetchYear(year).then(function(days){ var key=year+'-'+pad(month); return days.filter(function(d){return d.date.indexOf(key)===0;}); });
  }

  function fetchDayFromGithub(key){ return fetchYear(Number(key.slice(0,4))).then(function(days){ return days.filter(function(item){return item.date===key;})[0]||null; }); }
  function fetchYear(year){ if(yearCache[year])return yearCache[year]; yearCache[year]=tryBases(DN_LC_CONFIG.GITHUB_DATA_BASES,'year-'+year+'.json').then(function(data){ return (data.days||data.data||[]).map(normalizeDay).filter(Boolean); }).catch(function(){return[];}); return yearCache[year]; }
  function tryBases(bases,file){ var chain=Promise.reject(new Error('start')); bases.forEach(function(base){ chain=chain.catch(function(){return fetchJSON(base.replace(/\/+$/,'')+'/'+file);});}); return chain; }

  function normalizeDay(input){
    if(!input||typeof input!=='object')return null;
    var day=input.data&&input.data.date?input.data:input; if(!day.date)return null;
    var liturgy=day.liturgy||{}, readings=day.readings||{}, saint=liturgy.saint||day.saint||{}; if(typeof saint==='string')saint={name:saint};
    return {
      date:day.date,
      weekday:textFrom(day.weekday)||vietnameseWeekday(rawParseDate(day.date)),
      liturgy:{season:textFrom(liturgy.season||day.season),week:textFrom(liturgy.week||day.week),year_cycle:textFrom(liturgy.year_cycle||day.year_cycle||day.cycle),celebration:textFrom(liturgy.celebration||day.celebration||day.title||day.name),rank:normalizeRank(liturgy.rank||day.rank||liturgy.celebration||day.celebration),color:normalizeColor(liturgy.color||day.color),saint:{name:textFrom(saint.name||saint.title||''),image:safeUrl(saint.image||saint.thumbnail||saint.image_url||''),wiki:safeUrl(saint.wiki||saint.wikipedia||saint.url||'')}},
      readings:{reading1:normalizeReading(readings.reading1||day.reading1),psalm:normalizePsalm(readings.psalm||day.psalm),gospel_acclamation:textFrom(readings.gospel_acclamation||day.gospel_acclamation),gospel:normalizeReading(readings.gospel||day.gospel)},
      reflection:{title:textFrom(day.reflection&&day.reflection.title||day.reflection_title),content:textFrom(day.reflection&&day.reflection.content||day.reflection||day.meditation)},
      source:day.source||{},
      updated:day.updated||''
    };
  }

  function normalizeReading(value){ if(!value)return{reference:'',text:''}; if(typeof value!=='object')return{reference:'',text:textFrom(value)}; return{reference:textFrom(value.reference||value.ref||value.title),text:textFrom(value.text||value.content||value.paragraphs||value.html)}; }
  function normalizePsalm(value){ if(!value)return{reference:'',response:''}; if(typeof value!=='object')return{reference:'',response:textFrom(value)}; return{reference:textFrom(value.reference||value.ref||value.title),response:textFrom(value.response||value.text||value.content||value.paragraphs)}; }

  function renderCalendar(){
    var label=$('dnLcMonthLabel'), days=$('dnLcCalendarDays'); if(!label||!days)return;
    label.textContent=MONTH_NAMES[viewMonth.getMonth()]+'/'+viewMonth.getFullYear();
    var first=new Date(viewMonth.getFullYear(),viewMonth.getMonth(),1), startOffset=(first.getDay()+6)%7, gridStart=new Date(first); gridStart.setDate(first.getDate()-startOffset);
    var today=startOfDay(new Date()), nodes=[];
    for(var i=0;i<42;i++){ var day=new Date(gridStart); day.setDate(gridStart.getDate()+i); var btn=document.createElement('button'), key=formatDate(day), wk=day.getDay()===0||day.getDay()===6; btn.type='button'; btn.className='dn-lc-day'+(day.getMonth()!==viewMonth.getMonth()?' is-muted':'')+(wk?' is-weekend':'')+(sameDate(day,selectedDate)?' is-selected':'')+(sameDate(day,today)?' is-today':''); btn.textContent=String(day.getDate()); btn.setAttribute('data-date',key); btn.addEventListener('click',function(){ selectedDate=parseDate(this.getAttribute('data-date')); viewMonth=new Date(selectedDate.getFullYear(),selectedDate.getMonth(),1); var picker=$('dnLcDatePicker'); if(picker)picker.value=formatDate(selectedDate); loadDay(); }); nodes.push(btn); }
    setChildren(days,nodes);
    fetchMonth(viewMonth.getFullYear(), viewMonth.getMonth()+1).then(function(items){ var map={}; items.forEach(function(i){map[i.date]=true;}); document.querySelectorAll('#dnLcCalendarDays .dn-lc-day').forEach(function(btn){ if(map[btn.getAttribute('data-date')])btn.classList.add('has-data'); }); });
  }

  function hasReadingData(day){ var r=day&&day.readings||{}; return !!(textFrom(r.reading1&&r.reading1.text)||textFrom(r.psalm&&r.psalm.response)||textFrom(r.gospel_acclamation)||textFrom(r.gospel&&r.gospel.text)); }
  function buildReadingSections(day){ day=normalizeDay(day); if(!day)return[]; var r=day.readings||{}, out=[]; if(r.reading1&&(r.reading1.reference||r.reading1.text))out.push({title:'Bài đọc I',reference:r.reading1.reference,paragraphs:[r.reading1.text].filter(Boolean)}); if(r.psalm&&(r.psalm.reference||r.psalm.response))out.push({title:'Đáp ca',reference:r.psalm.reference,paragraphs:[r.psalm.response].filter(Boolean)}); if(r.gospel_acclamation)out.push({title:'Tung hô Tin Mừng',reference:'',paragraphs:[r.gospel_acclamation]}); if(r.gospel&&(r.gospel.reference||r.gospel.text))out.push({title:'Tin Mừng',reference:r.gospel.reference,paragraphs:[r.gospel.text].filter(Boolean)}); if(day.reflection&&(day.reflection.title||day.reflection.content))out.push({title:day.reflection.title||'Suy niệm',reference:'',paragraphs:[day.reflection.content].filter(Boolean)}); out.forEach(function(s){s.paragraphs=s.paragraphs.map(textFrom).filter(function(p){return p&&!isBlockedText(p);});}); return out.filter(function(s){return s.paragraphs.length||s.reference;}); }

  function renderReadings(day){ var box=$('dnLcReadings'); if(!box)return; currentSections=buildReadingSections(day); if(!currentSections.length){setChildren(box,[makeEl('div','dn-lc-state','Chưa có dữ liệu Lời Chúa cho ngày này.')]);return;} var nodes=[]; currentSections.forEach(function(s){ var wrap=makeEl('section','dn-lc-reading-section'); if(s.title)wrap.appendChild(makeEl('h3','dn-lc-reading-section-title',s.title)); if(s.reference)wrap.appendChild(makeEl('span','dn-lc-reference',s.reference)); s.paragraphs.forEach(function(p){wrap.appendChild(makeEl('p','dn-lc-reading-text',p));}); nodes.push(wrap); }); setChildren(box,nodes); }
  function showReadingState(msg){ currentSections=[]; var box=$('dnLcReadings'); if(box)setChildren(box,[makeEl('div','dn-lc-state',msg)]); }

  function renderDayInfo(day){ currentDay=normalizeDay(day); var l=currentDay?currentDay.liturgy:{}; var titleEl=$('dnLcFeastTitle'), dateEl=$('dnLcFeastDate'), rankEl=$('dnLcRankBadge'), colorEl=$('dnLcColorBadge'), saintEl=$('dnLcSaintName'), img=$('dnLcFeastImg'); var color=normalizeColor(l&&l.color)||'Xanh', rank=normalizeRank(l&&l.rank)||'Lễ thường', saintName=textFrom(l&&l.saint&&l.saint.name), celebration=textFrom(l&&l.celebration), image=safeUrl(l&&l.saint&&l.saint.image); var line=[textFrom(l&&l.season),textFrom(l&&l.week),textFrom(l&&l.year_cycle?'Năm '+l.year_cycle:''),celebration,rank,'Lễ phục màu '+color].filter(uniqueText); if(dateEl)dateEl.textContent=vietnameseDate(selectedDate); if(titleEl)titleEl.textContent=currentDay?line.join(' - '):'Dữ liệu phụng vụ đang được cập nhật.'; if(rankEl)rankEl.textContent=rank; if(colorEl){colorEl.textContent='Màu '+color;colorEl.setAttribute('data-color',color);} if(saintEl)saintEl.textContent=saintName||celebration||'Lễ trong ngày'; var imageTitle=saintName||celebration||rank||'Phụng vụ trong ngày'; if(img){img.alt='Hình '+imageTitle;img.src=image||defaultLiturgySVG(imageTitle,color,rank);} }
  function uniqueText(v,i,a){v=textFrom(v);return !!v&&a.map(textFrom).indexOf(v)===i;}
  function vietnameseWeekday(d){return['Chúa Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'][d.getDay()];}
  function vietnameseDate(d){return vietnameseWeekday(d)+', ngày '+pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();}
  function escapeSVG(t){return String(t).replace(/[&<>\"]/g,function(ch){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch];});}
  function defaultLiturgySVG(name,color,rank){var title=(name||'Phụng vụ').slice(0,46),sub=(rank||'').slice(0,26),bg=color==='Đỏ'?'#8f1d1d':color==='Tím'?'#5b2ca2':color==='Trắng'?'#b88a2a':'#0f6b37';var svg='<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520"><rect width="520" height="520" rx="64" fill="'+bg+'"/><circle cx="260" cy="170" r="88" fill="rgba(255,255,255,.20)"/><path d="M260 76v188M166 170h188" stroke="white" stroke-width="24" stroke-linecap="round" opacity=".92"/><path d="M120 360c56-76 224-76 280 0v62H120z" fill="rgba(255,255,255,.24)"/><text x="260" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="white">'+escapeSVG(title)+'</text><text x="260" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,.82)">'+escapeSVG(sub)+'</text></svg>';return'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg);}
  function buildShareText(){var lines=['Lời Chúa hằng ngày - '+vietnameseDate(selectedDate)]; if(currentDay){var l=currentDay.liturgy||{};var info=[textFrom(l.season),textFrom(l.week),textFrom(l.year_cycle?'Năm '+l.year_cycle:''),textFrom(l.celebration),textFrom(l.rank),textFrom(l.color?'Màu '+l.color:'')].filter(uniqueText).join(' - ');if(info)lines.push(info);} currentSections.forEach(function(s){lines.push('');lines.push(s.title+(s.reference?' - '+s.reference:''));s.paragraphs.forEach(function(p){if(!isBlockedText(p))lines.push(p);});});return lines.join('\n').trim();}
  function copyText(){var v=buildShareText()||'Chưa có dữ liệu.';if(navigator.clipboard&&navigator.clipboard.writeText)return navigator.clipboard.writeText(v).then(function(){flashButton('dnLcCopyBtn','Đã copy');});}
  function updateShareLinks(){var text=buildShareText(),page=location.href.split('#')[0]+'#loi-chua-'+formatDate(selectedDate),title='Lời Chúa hằng ngày '+formatDate(selectedDate);var u=encodeURIComponent(page),t=encodeURIComponent(title+'\n'+text);$('dnShareFacebook').href='https://www.facebook.com/sharer/sharer.php?u='+u;$('dnShareZalo').href='https://zalo.me/share?u='+u;$('dnShareTelegram').href='https://t.me/share/url?url='+u+'&text='+t;$('dnShareX').href='https://twitter.com/intent/tweet?url='+u+'&text='+t;$('dnShareEmail').href='mailto:?subject='+encodeURIComponent(title)+'&body='+t;}
  function shareText(){var text=buildShareText(),title='Lời Chúa hằng ngày - '+formatDate(selectedDate),url=location.href.split('#')[0]+'#loi-chua-'+formatDate(selectedDate);if(navigator.share){navigator.share({title:title,text:text,url:url}).catch(function(){});return;} updateShareLinks();var menu=$('dnLcShareMenu');if(menu)menu.classList.toggle('is-open');}
  function printText(){window.print();}
  function flashButton(id,text){var btn=$(id);if(!btn)return;var old=btn.textContent;btn.textContent=text;setTimeout(function(){btn.textContent=old;},1400);}
  function loadDay(){var requestId=++latestRequest,key=formatDate(selectedDate);renderCalendar();showReadingState('Đang tải dữ liệu...');renderDayInfo(null);fetchDay(key).then(function(day){if(requestId!==latestRequest)return;renderDayInfo(day);renderReadings(day);}).catch(function(){if(requestId!==latestRequest)return;renderDayInfo(null);showReadingState('Dữ liệu đang được cập nhật.');});}
  function init(){var picker=$('dnLcDatePicker'),todayBtn=$('dnLcTodayBtn'),prev=$('dnLcPrevMonth'),next=$('dnLcNextMonth');if(picker){picker.value=formatDate(selectedDate);picker.addEventListener('change',function(){selectedDate=parseDate(this.value);viewMonth=new Date(selectedDate.getFullYear(),selectedDate.getMonth(),1);loadDay();});} if(todayBtn)todayBtn.addEventListener('click',function(){selectedDate=startOfDay(new Date());viewMonth=new Date(selectedDate.getFullYear(),selectedDate.getMonth(),1);if(picker)picker.value=formatDate(selectedDate);loadDay();}); if(prev)prev.addEventListener('click',function(){viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()-1,1);renderCalendar();}); if(next)next.addEventListener('click',function(){viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,1);renderCalendar();}); $('dnLcCopyBtn')&&$('dnLcCopyBtn').addEventListener('click',copyText);$('dnLcShareBtn')&&$('dnLcShareBtn').addEventListener('click',shareText);$('dnLcPrintBtn')&&$('dnLcPrintBtn').addEventListener('click',printText);loadDay();}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
