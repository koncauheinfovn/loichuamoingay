name: Build Catholic Daily Data 2026

on:
  workflow_dispatch:
  schedule:
    - cron: "5 17 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: YEAR=2026 npm run build:data
      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data
          git diff --cached --quiet || git commit -m "Update 2026 liturgy data"
          git push
