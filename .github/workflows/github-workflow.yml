name: Build Catholic Daily Data

on:
  schedule:
    - cron: '5 17 * * *'
  workflow_dispatch:
    inputs:
      data_years:
        description: 'Khoảng năm cần lấy, mặc định 2026-2030'
        required: false
        default: '2026-2030'
      full_backfill:
        description: 'true = crawl toàn bộ ngày của các năm tìm thấy; false = cập nhật hôm nay/tuần/tháng'
        required: false
        default: 'false'
      gcatholic_year_start:
        description: 'Năm bắt đầu khi DATA_YEARS=auto'
        required: false
        default: ''
      gcatholic_year_end:
        description: 'Năm kết thúc khi DATA_YEARS=auto'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

env:
  DATA_YEARS: ${{ github.event.inputs.data_years || '2026-2030' }}
  FULL_BACKFILL: ${{ github.event.inputs.full_backfill || 'false' }}
  GCATHOLIC_YEAR_START: ${{ github.event.inputs.gcatholic_year_start || '2026' }}
  GCATHOLIC_YEAR_END: ${{ github.event.inputs.gcatholic_year_end || '2030' }}
  CRAWL_SCOPE: auto
  CRAWL_CONCURRENCY: 2
  TZ_NAME: Asia/Ho_Chi_Minh
  FORCE_REFRESH: false
  FETCH_IMAGES: true
  MAX_YEARS: 20
  USER_AGENT: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0 Safari/537.36

concurrency:
  group: catholic-daily-data
  cancel-in-progress: false

jobs:
  crawl-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: npm run check

      - name: Crawl and generate JSON
        run: npm run build:data

      - name: Commit JSON data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "chore(data): update Catholic daily JSON"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy GitHub Pages
        uses: actions/deploy-pages@v4
