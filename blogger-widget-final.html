<div class="dn-lc-compact" id="dnLcCompact">
  <div class="dn-lc-top-grid">
    <section class="dn-lc-card dn-lc-readings-card" aria-labelledby="dnLcCompactTitle">

        <div class="dn-lc-title-wrap">
          <span class="dn-lc-kicker">LỜI CHÚA</span>
          <h2 id="dnLcCompactTitle">Lời Chúa hằng ngày</h2>
        </div>

        <div class="dn-lc-controls">
          <input type="date" id="dnLcDatePicker" aria-label="Chọn ngày" />
          <button type="button" id="dnLcTodayBtn">Hôm nay</button>
        </div>
      </div>

      <div class="dn-lc-actionbar" aria-label="Công cụ Lời Chúa">
        <button type="button" id="dnLcCopyBtn">Copy</button>
        <button type="button" id="dnLcShareBtn">Chia sẻ</button>
        <button type="button" id="dnLcPrintBtn">In</button>
        <button type="button" id="dnLcFontMinus" aria-label="Giảm cỡ chữ">−</button>
        <button type="button" id="dnLcFontPlus" aria-label="Tăng cỡ chữ">+</button>
      </div>

      <div class="dn-lc-share-menu" id="dnLcShareMenu" aria-label="Chia sẻ mạng xã hội">
        <a id="dnShareFacebook" target="_blank" rel="noopener">Facebook</a>
        <a id="dnShareZalo" target="_blank" rel="noopener">Zalo</a>
        <a id="dnShareTelegram" target="_blank" rel="noopener">Telegram</a>
        <a id="dnShareX" target="_blank" rel="noopener">X</a>
        <a id="dnShareEmail">Email</a>
      </div>

      <div class="dn-lc-scroll" id="dnLcReadings" tabindex="0" aria-live="polite">
        <div class="dn-lc-state">Đang tải dữ liệu...</div>
      </div>
    </section>

    <section class="dn-lc-card dn-lc-calendar-card" aria-label="Lịch phụng vụ tháng">
      <div class="dn-lc-card-head dn-lc-calendar-head">
        <div class="dn-lc-title-wrap">
          <span class="dn-lc-kicker">PHỤNG VỤ</span>
          <h2>Lịch phụng vụ tháng</h2>
        </div>
      </div>

      <div class="dn-lc-monthbar">
        <button type="button" id="dnLcPrevMonth" class="dn-lc-month-btn" aria-label="Tháng trước">‹</button>

<script>
(function(){
  "use strict";

  var DN_LC_CONFIG = {
    API_BASE: "https://loichuamoingay.gioankminhcssr.workers.dev"
  };

  var MONTH_NAMES = [
    "Tháng 01","Tháng 02","Tháng 03","Tháng 04","Tháng 05","Tháng 06",
    "Tháng 07","Tháng 08","Tháng 09","Tháng 10","Tháng 11","Tháng 12"
  ];

  var BAD_LINES = [
    /Xin hỗ trợ sứ mạng/i,
    /Thêm các sự kiện sắp tới/i,
    /Lịch trình của ĐGH/i,
    /Các buổi tiếp kiến chung/i,
    /Tất cả kinh nguyện/i,
    /Hoạt động của ĐGH/i,
    /Đức tin chúng ta/i,
    /Thông tin hữu ích/i,
    /Chúng tôi là ai/i,
    /Liên lạc/i,
    /Những câu hỏi thường gặp/i,
    /Chú thích pháp luật/i,
    /Privacy Policy/i,
    /Các mạng khác/i,
    /Vatican\.va/i,
    /Vaticanstate\.va/i,
    /Peter's Pence/i,
    /^Photo$/i,
    /Các kênh khác/i,
    /^Schedules$/i,
    /^Short Waves$/i,
    /Tải chuyên nghiệp/i,
    /^Twitter$/i,
    /^Rss$/i,
    /Copyright/i,
    /Dicasterium pro Communicatione/i,
    /Bản văn Kinh Thánh/i,
    /Nhóm Phiên Dịch Các Giờ Kinh Phụng Vụ/i,
    /ktcgkpv\.org/i,
    /^Gửi đi$/i,
    /^In$/i,
    /^PHỤNG VỤ$/i,
    /^Lịch phụng vụ tháng$/i,
    /^T2T3T4T5T6T7CN$/i
  ];

  var monthCache = {};
  var selectedDate = startOfDay(new Date());
  var viewMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
  var latestRequest = 0;
  var currentDay = null;
  var currentSections = [];
  var readingFontSize = loadFontSize();

  function $(id){ return document.getElementById(id); }
  function pad(n){ return String(n).padStart(2,"0"); }
  function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function formatDate(d){ return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }

  function rawParseDate(value){
    var m = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? new Date(Number(m[1]), Number(m[2])-1, Number(m[3])) : startOfDay(new Date());
  }

  function parseDate(value){
    var m = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? new Date(Number(m[1]), Number(m[2])-1, Number(m[3])) : startOfDay(new Date());
  }

  function sameDate(a,b){
    return a && b && formatDate(a) === formatDate(b);
  }

  function apiBase(){
    return String(DN_LC_CONFIG.API_BASE || "").replace(/\/+$/,"");
  }

  function textFrom(value){
    if(value === null || value === undefined) return "";
    if(Array.isArray(value)) return value.map(textFrom).filter(Boolean).join("\n");

    if(typeof value === "object"){
      return textFrom(value.text || value.content || value.value || value.html || value.title || value.name || "");
    }

    var str = String(value || "");

    if(/&/i.test(str)){
      var ta = document.createElement("textarea");
      for(var i=0;i<3;i++){
        ta.innerHTML = str;
        if(ta.value === str) break;
        str = ta.value;
      }
    }

    return str
      .replace(/<script[\s\S]*?<\/script>/gi," ")
      .replace(/<style[\s\S]*?<\/style>/gi," ")
      .replace(/<[^>]+>/g," ")
      .replace(/\^\{([^}]+)\}/g,"$1")
      .replace(/[ \t]{2,}/g," ")
      .trim();
  }

  function badLine(value){
    var line = textFrom(value);
    return BAD_LINES.some(function(re){ return re.test(line); });
  }

  function cleanParagraph(value){
    return String(textFrom(value) || "")
      .split(/\n+/)
      .map(function(line){ return line.trim(); })
      .filter(Boolean)
      .filter(function(line){ return !badLine(line); })
      .join("\n")
      .trim();
  }

  function setChildren(node, children){
    while(node.firstChild) node.removeChild(node.firstChild);
    children.forEach(function(child){ node.appendChild(child); });
  }

  function makeEl(tag, className, text){
    var el = document.createElement(tag);
    if(className) el.className = className;
    if(text !== undefined) el.textContent = text;
    return el;
  }

  function normalizeColor(value){
    var c = textFrom(value).replace(/^màu\s+/i,"").trim();
    var l = c.toLowerCase();

    if(l.indexOf("trắng") >= 0) return "Trắng";
    if(l.indexOf("đỏ") >= 0) return "Đỏ";
    if(l.indexOf("xanh") >= 0) return "Xanh";
    if(l.indexOf("tím") >= 0) return "Tím";
    if(l.indexOf("hồng") >= 0) return "Hồng";

    return c || "Xanh";
  }

  function normalizeRank(value){
    var r = textFrom(value);
    var l = r.toLowerCase();

    if(l.indexOf("lễ trọng") >= 0) return "Lễ trọng";
    if(l.indexOf("lễ kính") >= 0) return "Lễ kính";
    if(l.indexOf("lễ nhớ") >= 0) return "Lễ nhớ";
    if(l.indexOf("nhớ tự do") >= 0) return "Lễ nhớ tự do";
    if(l.indexOf("chúa nhật") >= 0) return "Chúa nhật";

    return r || "Lễ thường";
  }

  function fetchJSON(url, timeout){
    timeout = timeout || 12000;

    var ctrl = typeof AbortController !== "undefined" ? new AbortController() : null;
    var timer = ctrl ? setTimeout(function(){ ctrl.abort(); }, timeout) : null;

    return fetch(url, {
      signal: ctrl ? ctrl.signal : undefined,
      cache: "no-cache"
    }).then(function(res){
      if(timer) clearTimeout(timer);
      if(!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    });
  }

  function fetchDay(key){
    return fetchJSON(apiBase() + "/api/date/" + encodeURIComponent(key))
      .then(normalizeDay);
  }

  function fetchMonth(year, month){
    var cacheKey = year + "-" + pad(month);
    if(monthCache[cacheKey]) return monthCache[cacheKey];

    monthCache[cacheKey] = fetchJSON(apiBase() + "/api/month?y=" + year + "&m=" + month)
      .then(function(data){
        return (data.days || []).map(normalizeDay).filter(Boolean);
      })
      .catch(function(){
        return [];
      });

    return monthCache[cacheKey];
  }

  function normalizeDay(input){
    if(!input || typeof input !== "object") return null;

    var day = input.data && input.data.date ? input.data : input;
    if(!day.date) return null;

    var liturgy = day.liturgy || {};
    var readings = day.readings || {};
    var saint = liturgy.saint || day.saint || {};

    if(typeof saint === "string") saint = { name: saint };

    return {
      date: day.date,
      weekday: textFrom(day.weekday) || vietnameseWeekday(rawParseDate(day.date)),

      liturgy: {
        season: textFrom(liturgy.season || day.season),
        week: textFrom(liturgy.week || day.week),
        year_cycle: textFrom(liturgy.year_cycle || day.year_cycle || day.cycle),
        celebration: textFrom(liturgy.celebration || day.celebration || day.title || day.name),
        rank: normalizeRank(liturgy.rank || day.rank || liturgy.celebration || day.celebration),
        color: normalizeColor(liturgy.color || day.color),
        saint: {
          name: textFrom(saint.name || saint.title || ""),
          image: "",
          wiki: ""
        }
      },

      readings: {
        reading1: normalizeReading(readings.reading1 || day.reading1),
        reading2: normalizeReading(readings.reading2 || day.reading2),
        psalm: normalizePsalm(readings.psalm || day.psalm),
        gospel_acclamation: cleanParagraph(readings.gospel_acclamation || day.gospel_acclamation),
        gospel: normalizeReading(readings.gospel || day.gospel)
      },

      source: day.source || {},
      updated: day.updated || ""
    };
  }

  function normalizeReading(value){
    if(!value) return { reference:"", text:"" };

    if(typeof value !== "object"){
      return { reference:"", text:cleanParagraph(value) };
    }

    return {
      reference: textFrom(value.reference || value.ref || value.title),
      text: cleanParagraph(value.text || value.content || value.paragraphs || value.html)
    };
  }

  function normalizePsalm(value){
    if(!value) return { reference:"", response:"" };

    if(typeof value !== "object"){
      return { reference:"", response:cleanParagraph(value) };
    }

    return {
      reference: textFrom(value.reference || value.ref || value.title),
      response: cleanParagraph(value.response || value.text || value.content || value.paragraphs)
    };
  }

  function renderCalendar(){
    var label = $("dnLcMonthLabel");
    var days = $("dnLcCalendarDays");
    if(!label || !days) return;

    label.textContent = MONTH_NAMES[viewMonth.getMonth()] + "/" + viewMonth.getFullYear();

    var first = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
    var startOffset = (first.getDay() + 6) % 7;
    var gridStart = new Date(first);
    gridStart.setDate(first.getDate() - startOffset);

    var today = startOfDay(new Date());
    var nodes = [];

    for(var i=0;i<42;i++){
      var day = new Date(gridStart);
      day.setDate(gridStart.getDate() + i);

      var btn = document.createElement("button");
      var key = formatDate(day);
      var weekend = day.getDay() === 0 || day.getDay() === 6;

      btn.type = "button";
      btn.className =
        "dn-lc-day" +
        (day.getMonth() !== viewMonth.getMonth() ? " is-muted" : "") +
        (weekend ? " is-weekend" : "") +
        (sameDate(day, selectedDate) ? " is-selected" : "") +
        (sameDate(day, today) ? " is-today" : "");

      btn.textContent = String(day.getDate());
      btn.setAttribute("data-date", key);
      btn.setAttribute("aria-label", key);

      if(sameDate(day, selectedDate)) btn.setAttribute("aria-current", "date");

      btn.addEventListener("click", function(){
        selectedDate = parseDate(this.getAttribute("data-date"));
        viewMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);

        var picker = $("dnLcDatePicker");
        if(picker) picker.value = formatDate(selectedDate);

        loadDay();
      });

      nodes.push(btn);
    }

    setChildren(days, nodes);

    fetchMonth(viewMonth.getFullYear(), viewMonth.getMonth()+1).then(function(items){
      var map = {};
      items.forEach(function(item){ map[item.date] = true; });

      document.querySelectorAll("#dnLcCalendarDays .dn-lc-day").forEach(function(btn){
        if(map[btn.getAttribute("data-date")]) btn.classList.add("has-data");
      });
    });
  }

  function hasReadingData(day){
    var r = day && day.readings || {};

    return Boolean(
      cleanParagraph(r.reading1 && r.reading1.text) ||
      cleanParagraph(r.reading2 && r.reading2.text) ||
      cleanParagraph(r.psalm && r.psalm.response) ||
      cleanParagraph(r.gospel_acclamation) ||
      cleanParagraph(r.gospel && r.gospel.text)
    );
  }

  function buildReadingSections(day){
    day = normalizeDay(day);
    if(!day) return [];

    var r = day.readings || {};
    var out = [];

    if(r.reading1 && (r.reading1.reference || r.reading1.text)){
      out.push({
        title:"Bài đọc I",
        reference:r.reading1.reference,
        paragraphs:[r.reading1.text].filter(Boolean)
      });
    }

    if(r.reading2 && (r.reading2.reference || r.reading2.text)){
      out.push({
        title:"Bài đọc II",
        reference:r.reading2.reference,
        paragraphs:[r.reading2.text].filter(Boolean)
      });
    }

    if(r.psalm && (r.psalm.reference || r.psalm.response)){
      out.push({
        title:"Đáp ca",
        reference:r.psalm.reference,
        paragraphs:[r.psalm.response].filter(Boolean)
      });
    }

    if(r.gospel_acclamation){
      out.push({
        title:"Tung hô Tin Mừng",
        reference:"",
        paragraphs:[r.gospel_acclamation]
      });
    }

    if(r.gospel && (r.gospel.reference || r.gospel.text)){
      out.push({
        title:"Tin Mừng",
        reference:r.gospel.reference,
        paragraphs:[r.gospel.text].filter(Boolean)
      });
    }

    out.forEach(function(section){
      section.paragraphs = section.paragraphs
        .map(cleanParagraph)
        .filter(Boolean)
        .filter(function(p){ return !badLine(p); });
    });

    return out.filter(function(section){
      return section.paragraphs.length || section.reference;
    });
  }

  function renderReadings(day){
    var box = $("dnLcReadings");
    if(!box) return;

    currentSections = buildReadingSections(day);

    if(!currentSections.length){
      setChildren(box, [makeEl("div", "dn-lc-state", "Chưa có dữ liệu Lời Chúa cho ngày này.")]);
      return;
    }

    var nodes = [];

    currentSections.forEach(function(section){
      var wrap = makeEl("section", "dn-lc-reading-section");

      if(section.title){
        wrap.appendChild(makeEl("h3", "dn-lc-reading-section-title", section.title));
      }

      if(section.reference){
        wrap.appendChild(makeEl("span", "dn-lc-reference", section.reference));
      }

      section.paragraphs.forEach(function(p){
        var clean = cleanParagraph(p);
        if(clean) wrap.appendChild(makeEl("p", "dn-lc-reading-text", clean));
      });

      nodes.push(wrap);
    });

    setChildren(box, nodes);
  }

  function showReadingState(message){
    currentSections = [];
    var box = $("dnLcReadings");
    if(box) setChildren(box, [makeEl("div", "dn-lc-state", message)]);
  }

  function renderDayInfo(day){
    currentDay = normalizeDay(day);

    var liturgy = currentDay ? currentDay.liturgy : {};
    var titleEl = $("dnLcFeastTitle");
    var dateEl = $("dnLcFeastDate");
    var rankEl = $("dnLcRankBadge");
    var colorEl = $("dnLcColorBadge");
    var saintEl = $("dnLcSaintName");
    var img = $("dnLcFeastImg");

    var color = normalizeColor(liturgy && liturgy.color) || "Xanh";
    var rank = normalizeRank(liturgy && liturgy.rank) || "Lễ thường";
    var saintName = textFrom(liturgy && liturgy.saint && liturgy.saint.name);
    var celebration = textFrom(liturgy && liturgy.celebration);

    var line = [
      textFrom(liturgy && liturgy.season),
      textFrom(liturgy && liturgy.week),
      textFrom(liturgy && liturgy.year_cycle ? "Năm " + liturgy.year_cycle : ""),
      celebration,
      rank,
      "Lễ phục màu " + color
    ].filter(uniqueText);

    if(dateEl) dateEl.textContent = vietnameseDate(selectedDate);
    if(titleEl) titleEl.textContent = currentDay ? line.join(" - ") : "Dữ liệu phụng vụ đang được cập nhật.";
    if(rankEl) rankEl.textContent = rank;

    if(colorEl){
      colorEl.textContent = "Màu " + color;
      colorEl.setAttribute("data-color", color);
    }

    if(saintEl) saintEl.textContent = saintName || celebration || "Lễ trong ngày";

    var imageTitle = saintName || celebration || rank || "Phụng vụ";

    if(img){
      img.alt = "Hình phụng vụ - " + imageTitle;
      img.src = defaultLiturgySVG(imageTitle, color, rank);
    }
  }

  function uniqueText(value, index, arr){
    value = textFrom(value);
    return Boolean(value) && arr.map(textFrom).indexOf(value) === index;
  }

  function vietnameseWeekday(date){
    return ["Chúa Nhật","Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy"][date.getDay()];
  }

  function vietnameseDate(date){
    return vietnameseWeekday(date) + ", ngày " + pad(date.getDate()) + "/" + pad(date.getMonth()+1) + "/" + date.getFullYear();
  }

  function escapeSVG(text){
    return String(text).replace(/[&<>\"]/g, function(ch){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[ch];
    });
  }

  function defaultLiturgySVG(name, color, rank){
    var title = (name || "Phụng vụ").slice(0, 46);
    var sub = (rank || "").slice(0, 28);
    var bg = color === "Đỏ" ? "#8f1d1d" :
             color === "Tím" ? "#5b2ca2" :
             color === "Trắng" ? "#b88a2a" :
             color === "Hồng" ? "#a51f57" :
             "#0f6b37";

    var svg =
      '<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520">' +
      '<rect width="520" height="520" rx="64" fill="' + bg + '"/>' +
      '<circle cx="260" cy="170" r="88" fill="rgba(255,255,255,.20)"/>' +
      '<path d="M260 76v188M166 170h188" stroke="white" stroke-width="24" stroke-linecap="round" opacity=".92"/>' +
      '<path d="M120 360c56-76 224-76 280 0v62H120z" fill="rgba(255,255,255,.24)"/>' +
      '<text x="260" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="white">' + escapeSVG(title) + '</text>' +
      '<text x="260" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,.82)">' + escapeSVG(sub) + '</text>' +
      '</svg>';

    return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
  }

  function buildShareText(){
    var lines = [];
    lines.push("Lời Chúa hằng ngày - " + vietnameseDate(selectedDate));

    if(currentDay){
      var l = currentDay.liturgy || {};
      var info = [
        textFrom(l.season),
        textFrom(l.week),
        textFrom(l.year_cycle ? "Năm " + l.year_cycle : ""),
        textFrom(l.celebration),
        textFrom(l.rank),
        textFrom(l.color ? "Màu " + l.color : "")
      ].filter(uniqueText).join(" - ");

      if(info) lines.push(info);
    }

    currentSections.forEach(function(section){
      lines.push("");
      lines.push(section.title + (section.reference ? " - " + section.reference : ""));

      section.paragraphs.forEach(function(p){
        var clean = cleanParagraph(p);
        if(clean) lines.push(clean);
      });
    });

    return lines.join("\n").trim();
  }

  function copyText(){
    var value = buildShareText() || "Chưa có dữ liệu.";

    if(navigator.clipboard && navigator.clipboard.writeText){
      return navigator.clipboard.writeText(value).then(function(){
        flashButton("dnLcCopyBtn", "Đã copy");
      });
    }

    var ta = document.createElement("textarea");
    ta.value = value;
    document.body.appendChild(ta);
    ta.select();

    try{
      document.execCommand("copy");
      flashButton("dnLcCopyBtn", "Đã copy");
    }catch(e){}

    document.body.removeChild(ta);
    return Promise.resolve();
  }

  function updateShareLinks(){
    var text = buildShareText();
    var page = location.href.split("#")[0] + "#loi-chua-" + formatDate(selectedDate);
    var title = "Lời Chúa hằng ngày " + formatDate(selectedDate);
    var u = encodeURIComponent(page);
    var t = encodeURIComponent(title + "\n" + text);

    $("dnShareFacebook").href = "https://www.facebook.com/sharer/sharer.php?u=" + u;
    $("dnShareZalo").href = "https://zalo.me/share?u=" + u;
    $("dnShareTelegram").href = "https://t.me/share/url?url=" + u + "&text=" + t;
    $("dnShareX").href = "https://twitter.com/intent/tweet?url=" + u + "&text=" + t;
    $("dnShareEmail").href = "mailto:?subject=" + encodeURIComponent(title) + "&body=" + t;
  }

  function shareText(){
    var text = buildShareText();
    var title = "Lời Chúa hằng ngày - " + formatDate(selectedDate);
    var url = location.href.split("#")[0] + "#loi-chua-" + formatDate(selectedDate);

    if(navigator.share){
      navigator.share({
        title:title,
        text:text,
        url:url
      }).catch(function(){});
      return;
    }

    updateShareLinks();

    var menu = $("dnLcShareMenu");
    if(menu) menu.classList.toggle("is-open");
  }

  function printText(){
    var title = "Lời Chúa hằng ngày - " + formatDate(selectedDate);

    var html =
      '<!doctype html><html><head><meta charset="utf-8">' +
      '<title>' + escapeHTML(title) + '</title>' +
      '<style>body{font-family:Arial,sans-serif;line-height:1.7;padding:28px;color:#111}h1{font-size:24px}h2{font-size:18px;margin-top:24px}.ref{font-weight:bold;color:#555;text-transform:uppercase;font-size:12px}p{white-space:pre-line;text-align:justify}</style>' +
      '</head><body><h1>' + escapeHTML(title) + '</h1>' +
      '<p>' + escapeHTML(vietnameseDate(selectedDate)) + '</p>';

    currentSections.forEach(function(section){
      html += '<h2>' + escapeHTML(section.title) + '</h2>';

      if(section.reference){
        html += '<div class="ref">' + escapeHTML(section.reference) + '</div>';
      }

      section.paragraphs.forEach(function(p){
        var clean = cleanParagraph(p);
        if(clean) html += '<p>' + escapeHTML(clean) + '</p>';
      });
    });

    html += '</body></html>';

    var win = window.open("", "_blank");

    if(!win){
      window.print();
      return;
    }

    win.document.open();
    win.document.write(html);
    win.document.close();
    win.focus();

    setTimeout(function(){
      win.print();
    }, 300);
  }

  function escapeHTML(value){
    return String(value || "").replace(/[&<>"']/g, function(ch){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch];
    });
  }

  function flashButton(id, text){
    var btn = $(id);
    if(!btn) return;

    var old = btn.textContent;
    btn.textContent = text;

    setTimeout(function(){
      btn.textContent = old;
    }, 1400);
  }

  function loadFontSize(){
    var saved = 0;

    try{
      saved = Number(localStorage.getItem("dn_lc_reading_font_size") || 14.2);
    }catch(e){
      saved = 14.2;
    }

    if(!saved || saved < 12 || saved > 22) saved = 14.2;
    return saved;
  }

  function applyFontSize(){
    var root = $("dnLcCompact");
    if(root) root.style.setProperty("--dn-lc-reading-size", readingFontSize + "px");

    try{
      localStorage.setItem("dn_lc_reading_font_size", String(readingFontSize));
    }catch(e){}
  }

  function changeFontSize(delta){
    readingFontSize = Math.max(12, Math.min(22, readingFontSize + delta));
    applyFontSize();
  }

  function loadDay(){
    var requestId = ++latestRequest;
    var key = formatDate(selectedDate);

    renderCalendar();
    showReadingState("Đang tải dữ liệu...");
    renderDayInfo(null);

    fetchDay(key).then(function(day){
      if(requestId !== latestRequest) return;

      renderDayInfo(day);

      if(hasReadingData(day)){
        renderReadings(day);
      }else{
        showReadingState("Chưa có dữ liệu Lời Chúa cho ngày này.");
      }

    }).catch(function(){
      if(requestId !== latestRequest) return;
      renderDayInfo(null);
      showReadingState("Dữ liệu đang được cập nhật.");
    });
  }

  function init(){
    var root = $("dnLcCompact");
    if(!root) return;

    applyFontSize();

    var picker = $("dnLcDatePicker");
    var todayBtn = $("dnLcTodayBtn");
    var prev = $("dnLcPrevMonth");
    var next = $("dnLcNextMonth");

    if(picker){
      picker.value = formatDate(selectedDate);

      picker.addEventListener("change", function(){
        selectedDate = parseDate(this.value);
        viewMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
        this.value = formatDate(selectedDate);
        loadDay();
      });
    }

    if(todayBtn){
      todayBtn.addEventListener("click", function(){
        selectedDate = startOfDay(new Date());
        viewMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);

        if(picker) picker.value = formatDate(selectedDate);

        loadDay();
      });
    }

    if(prev){
      prev.addEventListener("click", function(){
        viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth()-1, 1);
        renderCalendar();
      });
    }

    if(next){
      next.addEventListener("click", function(){
        viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth()+1, 1);
        renderCalendar();
      });
    }

    $("dnLcCopyBtn") && $("dnLcCopyBtn").addEventListener("click", copyText);
    $("dnLcShareBtn") && $("dnLcShareBtn").addEventListener("click", shareText);
    $("dnLcPrintBtn") && $("dnLcPrintBtn").addEventListener("click", printText);
    $("dnLcFontMinus") && $("dnLcFontMinus").addEventListener("click", function(){ changeFontSize(-1); });
    $("dnLcFontPlus") && $("dnLcFontPlus").addEventListener("click", function(){ changeFontSize(1); });

    loadDay();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  }else{
    init();
  }
})();
</script>
