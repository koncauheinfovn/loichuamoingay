<div class="dn-lc-compact" id="dnLcCompact">
  <div class="dn-lc-top-grid">
    <section class="dn-lc-card">
      <div class="dn-lc-head">
        <div><span class="dn-kicker">LỜI CHÚA</span><h2>Lời Chúa hằng ngày</h2></div>

    </div>

</div>

<style>
.dn-lc-compact{--bg:linear-gradient(180deg,rgba(7,19,15,.97),rgba(4,14,11,.98));--soft:rgba(255,255,255,.055);--ink:var(--mist,#f3ead7);--strong:var(--cream,#fff4dc);--muted:rgba(243,234,215,.68);--line:rgba(214,170,79,.22);--line2:rgba(214,170,79,.38);--accent:var(--bazan,#b35b2d);--gold:var(--gong,#d6aa4f);--danger:#ef6464;--fs:14.2px;width:min(1120px,calc(100% - 28px));margin:30px auto;color:var(--ink);font-family:var(--font-body,"Be Vietnam Pro",Arial,sans-serif)}
html.dn-light-root .dn-lc-compact,html[data-theme="light"] .dn-lc-compact,body.dn-light .dn-lc-compact{--bg:linear-gradient(180deg,rgba(255,252,245,.98),rgba(242,234,218,.98));--soft:rgba(120,83,16,.055);--ink:#24312b;--strong:#121914;--muted:#657168;--line:rgba(120,83,16,.18);--line2:rgba(120,83,16,.34);--gold:#8a5a12}

.dn-cal-head{min-height:76px}.dn-kicker{display:block;margin:0 0 4px;font-size:10px;font-weight:900;letter-spacing:2.4px;color:var(--gold)}.dn-lc-card h2{margin:0;color:var(--strong);font:900 clamp(18px,2vw,26px)/1.12 Georgia,serif}
.dn-controls{display:flex;gap:8px;min-width:224px}.dn-controls input,.dn-controls button,.dn-actions button{height:34px;border-radius:12px;font:800 12px/1 inherit}.dn-controls input{width:100%;min-width:132px;padding:0 10px;color:var(--strong);background:rgba(255,255,255,.08);border:1px solid var(--line2)}
.dn-controls button,.dn-actions button{border:0;padding:0 12px;color:#fff;background:linear-gradient(135deg,var(--accent),#c97842);cursor:pointer}.dn-actions{display:flex;gap:8px;justify-content:flex-end;padding:8px 18px;border-bottom:1px solid var(--line)}
.dn-actions button{height:28px;font-size:11px;background:var(--soft);color:var(--ink);border:1px solid var(--line)}#dnMinus,#dnPlus{min-width:28px;padding:0;font-size:15px}.dn-share{display:none;gap:6px;justify-content:flex-end;padding:8px 18px;border-bottom:1px solid var(--line)}.dn-share.on{display:flex}.dn-share a{padding:5px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink);font-size:11px;font-weight:900;text-decoration:none}
.dn-scroll{flex:1;min-height:0;overflow-y:auto;padding:16px 18px 22px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent}.dn-state{padding:14px;border:1px dashed var(--line2);border-radius:14px;color:var(--muted)}
.dn-sec{margin:0 0 18px}.dn-sec h3{margin:0 0 8px;padding-bottom:7px;color:var(--gold);border-bottom:1px dashed var(--line2);font:900 calc(var(--fs) + 2px)/1.25 Georgia,serif}.dn-ref{display:block;margin:-2px 0 8px;color:var(--muted);font-size:calc(var(--fs) - 2px);font-weight:900;letter-spacing:.08em;text-transform:uppercase}.dn-txt{margin:0 0 12px;font-size:var(--fs);line-height:1.82;text-align:justify;white-space:pre-line}
.dn-month{display:grid;grid-template-columns:36px 1fr 36px;align-items:center;gap:6px;padding:10px 16px 4px;height:48px}.dn-month strong{text-align:center;color:var(--strong)}.dn-month button{width:32px;height:32px;border-radius:999px;border:1px solid var(--line);background:var(--soft);color:var(--strong);font-size:23px}
.dn-week,.dn-days{display:grid;grid-template-columns:repeat(7,1fr)}.dn-week{height:26px;padding:0 16px 4px}.dn-week span{text-align:center;font-size:10px;font-weight:900;text-decoration:underline}.dn-week span:nth-child(6),.dn-week span:nth-child(7){color:var(--danger)}
.dn-days{flex:1;grid-template-rows:repeat(6,1fr);gap:6px;padding:0 16px 16px}.dn-day{border:1px solid transparent;border-radius:7px;background:rgba(178,91,45,.88);color:#fff;font-size:12px;font-weight:900;cursor:pointer;position:relative}.dn-day.mute{opacity:.48}.dn-day.sel{background:var(--gold)!important}.dn-day.today{border-color:var(--gold)}.dn-day.data:after{content:"";position:absolute;left:50%;bottom:4px;width:4px;height:4px;border-radius:999px;background:currentColor;transform:translateX(-50%)}
.dn-feast{margin-top:18px;border-radius:20px;padding:16px;display:grid;grid-template-columns:132px 1fr;gap:18px;align-items:center}.dn-imgwrap{width:132px;height:132px;border-radius:18px;overflow:hidden;border:1px solid var(--line)}.dn-img{width:100%;height:100%;object-fit:cover}.dn-date{margin-bottom:7px;color:var(--muted);font-size:11px;font-weight:900;letter-spacing:1.6px;text-transform:uppercase}#dnFeastTitle{margin:0 0 10px;color:var(--strong);font:900 clamp(18px,2vw,25px)/1.28 Georgia,serif}.dn-tags{display:flex;flex-wrap:wrap;gap:7px}.dn-tags span{padding:6px 10px;border-radius:999px;background:var(--soft);border:1px solid var(--line);font-size:11px;font-weight:900}
#dnColor[data-color="Trắng"]{background:#f7f7f2;color:#2b2b22}#dnColor[data-color="Đỏ"]{background:#ffe8e8;color:#9c1616}#dnColor[data-color="Xanh"]{background:#e6f5ec;color:#0f6b37}#dnColor[data-color="Tím"]{background:#efe8ff;color:#5b2ca2}#dnColor[data-color="Hồng"]{background:#ffe9f2;color:#a51f57}
@media(max-width:900px){.dn-lc-top-grid{grid-template-columns:1fr}.dn-lc-card{aspect-ratio:auto;height:min(620px,88vh)}.dn-lc-card:nth-child(2){height:auto;aspect-ratio:1/1}}@media(max-width:620px){.dn-lc-compact{width:calc(100% - 18px)}.dn-lc-head{flex-direction:column;align-items:stretch}.dn-controls{min-width:0}.dn-actions{flex-wrap:wrap}.dn-actions button{flex:1}.dn-feast{grid-template-columns:92px 1fr}.dn-imgwrap{width:92px;height:92px}}
</style>

<script>
(function(){
  "use strict";
  var API="https://loichuamoingay.gioankminhcssr.workers.dev";
  var MN=["Tháng 01","Tháng 02","Tháng 03","Tháng 04","Tháng 05","Tháng 06","Tháng 07","Tháng 08","Tháng 09","Tháng 10","Tháng 11","Tháng 12"];
  var BAD=[/Xin hỗ trợ sứ mạng/i,/Thêm các sự kiện/i,/Lịch trình của ĐGH/i,/Đức tin chúng ta/i,/Thông tin hữu ích/i,/Vatican\.va/i,/Copyright/i,/Dicasterium/i,/Bản văn Kinh Thánh/i,/ktcgkpv\.org/i,/^Gửi đi$/i,/^In$/i];
  var cache={}, sel=sod(new Date()), view=new Date(sel.getFullYear(),sel.getMonth(),1), req=0, curDay=null, curSecs=[], fs=loadFs();
  function $(id){return document.getElementById(id)} function pad(n){return String(n).padStart(2,"0")} function sod(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate())} function fmt(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())} function parse(v){var m=String(v||"").match(/^(\d{4})-(\d{2})-(\d{2})$/);return m?new Date(+m[1],+m[2]-1,+m[3]):sod(new Date())} function same(a,b){return a&&b&&fmt(a)===fmt(b)}
  function decode(s){var ta=document.createElement("textarea"),v=String(s||"");for(var i=0;i<3;i++){ta.innerHTML=v;if(ta.value===v)break;v=ta.value}return v}
  function txt(v){if(v==null)return"";if(Array.isArray(v))return v.map(txt).filter(Boolean).join("\n");if(typeof v==="object")return txt(v.text||v.content||v.value||v.html||v.title||v.name||"");return decode(String(v)).replace(/<[^>]+>/g," ").replace(/\^\{([^}]+)\}/g,"$1").replace(/[ \t]{2,}/g," ").trim()}
  function bad(s){s=txt(s);return BAD.some(function(r){return r.test(s)})} function clean(v){return String(txt(v)||"").split(/\n+/).map(function(x){return x.trim()}).filter(Boolean).filter(function(x){return !bad(x)}).join("\n").trim()}
  function color(v){var x=txt(v).replace(/^màu\s+/i,""),l=x.toLowerCase();if(l.includes("trắng"))return"Trắng";if(l.includes("đỏ"))return"Đỏ";if(l.includes("xanh"))return"Xanh";if(l.includes("tím"))return"Tím";if(l.includes("hồng"))return"Hồng";return x||"Xanh"} function rank(v){var x=txt(v),l=x.toLowerCase();if(l.includes("lễ trọng"))return"Lễ trọng";if(l.includes("lễ kính"))return"Lễ kính";if(l.includes("lễ nhớ"))return"Lễ nhớ";if(l.includes("chúa nhật"))return"Chúa nhật";return x||"Lễ thường"}
  function getJSON(url){return fetch(url,{cache:"no-cache"}).then(function(r){if(!r.ok)throw Error("HTTP "+r.status);return r.json()})}
  function normRead(v){if(!v)return{reference:"",text:""};if(typeof v!=="object")return{reference:"",text:clean(v)};return{reference:txt(v.reference||v.ref||v.title),text:clean(v.text||v.content||v.paragraphs||v.html)}}
  function normPsalm(v){if(!v)return{reference:"",response:""};if(typeof v!=="object")return{reference:"",response:clean(v)};return{reference:txt(v.reference||v.ref||v.title),response:clean(v.response||v.text||v.content||v.paragraphs)}}
  function normDay(input){if(!input||typeof input!=="object")return null;var d=input.data&&input.data.date?input.data:input;if(!d.date)return null;var l=d.liturgy||{},r=d.readings||{},s=l.saint||{};if(typeof s==="string")s={name:s};return{date:d.date,weekday:txt(d.weekday)||wd(parse(d.date)),liturgy:{season:txt(l.season||d.season),week:txt(l.week||d.week),year_cycle:txt(l.year_cycle||d.year_cycle),celebration:txt(l.celebration||d.celebration||d.title),rank:rank(l.rank||d.rank||l.celebration),color:color(l.color||d.color),saint:{name:txt(s.name||"")}},readings:{reading1:normRead(r.reading1||d.reading1),reading2:normRead(r.reading2||d.reading2),psalm:normPsalm(r.psalm||d.psalm),gospel_acclamation:clean(r.gospel_acclamation||d.gospel_acclamation),gospel:normRead(r.gospel||d.gospel)},source:d.source||{}}}
  function fetchDay(k){return getJSON(API.replace(/\/+$/,"")+"/api/date/"+encodeURIComponent(k)).then(normDay)} function fetchMonth(y,m){var k=y+"-"+pad(m);if(cache[k])return cache[k];cache[k]=getJSON(API.replace(/\/+$/,"")+"/api/month?y="+y+"&m="+m).then(function(d){return(d.days||[]).map(normDay).filter(Boolean)}).catch(function(){return[]});return cache[k]}
  function renderCal(){var label=$("dnMonthLabel"),days=$("dnDays");if(!label||!days)return;label.textContent=MN[view.getMonth()]+"/"+view.getFullYear();var first=new Date(view.getFullYear(),view.getMonth(),1),off=(first.getDay()+6)%7,start=new Date(first);start.setDate(first.getDate()-off);var today=sod(new Date()),nodes=[];for(var i=0;i<42;i++){var d=new Date(start);d.setDate(start.getDate()+i);var b=document.createElement("button"),k=fmt(d);b.type="button";b.className="dn-day"+(d.getMonth()!==view.getMonth()?" mute":"")+(same(d,sel)?" sel":"")+(same(d,today)?" today":"");b.textContent=d.getDate();b.dataset.date=k;b.onclick=function(){sel=parse(this.dataset.date);view=new Date(sel.getFullYear(),sel.getMonth(),1);$("dnDate").value=fmt(sel);load()};nodes.push(b)}days.replaceChildren.apply(days,nodes);fetchMonth(view.getFullYear(),view.getMonth()+1).then(function(items){var mp={};items.forEach(function(x){mp[x.date]=1});document.querySelectorAll("#dnDays .dn-day").forEach(function(b){if(mp[b.dataset.date])b.classList.add("data")})})}
  function sections(day){day=normDay(day);if(!day)return[];var r=day.readings||{},out=[];if(r.reading1&&(r.reading1.reference||r.reading1.text))out.push({t:"Bài đọc I",ref:r.reading1.reference,p:[r.reading1.text]});if(r.reading2&&(r.reading2.reference||r.reading2.text))out.push({t:"Bài đọc II",ref:r.reading2.reference,p:[r.reading2.text]});if(r.psalm&&(r.psalm.reference||r.psalm.response))out.push({t:"Đáp ca",ref:r.psalm.reference,p:[r.psalm.response]});if(r.gospel_acclamation)out.push({t:"Tung hô Tin Mừng",ref:"",p:[r.gospel_acclamation]});if(r.gospel&&(r.gospel.reference||r.gospel.text))out.push({t:"Tin Mừng",ref:r.gospel.reference,p:[r.gospel.text]});out.forEach(function(s){s.p=s.p.map(clean).filter(Boolean)});return out.filter(function(s){return s.ref||s.p.length})}
  function renderReadings(day){var box=$("dnReadings");curSecs=sections(day);if(!curSecs.length){box.innerHTML='<div class="dn-state">Chưa có dữ liệu Lời Chúa cho ngày này.</div>';return}box.innerHTML="";curSecs.forEach(function(s){var sec=document.createElement("section");sec.className="dn-sec";sec.appendChild(el("h3","",s.t));if(s.ref)sec.appendChild(el("span","dn-ref",s.ref));s.p.forEach(function(p){sec.appendChild(el("p","dn-txt",p))});box.appendChild(sec)})}
  function feast(day){curDay=normDay(day);var l=curDay?curDay.liturgy:{},c=color(l&&l.color),r=rank(l&&l.rank),saint=txt(l&&l.saint&&l.saint.name),cele=txt(l&&l.celebration);$("dnFeastDate").textContent=vdate(sel);$("dnFeastTitle").textContent=curDay?[txt(l.season),txt(l.week),txt(l.year_cycle?"Năm "+l.year_cycle:""),cele,r,"Lễ phục màu "+c].filter(unique).join(" - "):"Dữ liệu phụng vụ đang được cập nhật.";$("dnRank").textContent=r;$("dnColor").textContent="Màu "+c;$("dnColor").dataset.color=c;$("dnSaint").textContent=saint||cele||"Lễ trong ngày";$("dnImg").src=svg(saint||cele||r,c,r)}
  function el(tag,cls,text){var x=document.createElement(tag);if(cls)x.className=cls;if(text!==undefined)x.textContent=text;return x} function unique(v,i,a){v=txt(v);return v&&a.map(txt).indexOf(v)===i} function wd(d){return["Chúa Nhật","Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy"][d.getDay()]} function vdate(d){return wd(d)+", ngày "+pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear()}
  function svg(name,c,r){var bg=c==="Đỏ"?"#8f1d1d":c==="Tím"?"#5b2ca2":c==="Trắng"?"#b88a2a":c==="Hồng"?"#a51f57":"#0f6b37";var esc=function(s){return String(s).replace(/[&<>"]/g,function(ch){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[ch]})};var s='<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520"><rect width="520" height="520" rx="64" fill="'+bg+'"/><circle cx="260" cy="170" r="88" fill="rgba(255,255,255,.20)"/><path d="M260 76v188M166 170h188" stroke="white" stroke-width="24" stroke-linecap="round"/><path d="M120 360c56-76 224-76 280 0v62H120z" fill="rgba(255,255,255,.24)"/><text x="260" y="430" text-anchor="middle" font-family="Arial" font-size="30" font-weight="800" fill="white">'+esc((name||"Phụng vụ").slice(0,46))+'</text><text x="260" y="468" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="white">'+esc((r||"").slice(0,28))+'</text></svg>';return"data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(s)}
  function shareText(){var lines=["Lời Chúa hằng ngày - "+vdate(sel)];curSecs.forEach(function(s){lines.push("",s.t+(s.ref?" - "+s.ref:""));s.p.forEach(function(p){lines.push(clean(p))})});return lines.join("\n").trim()} function copy(){navigator.clipboard&&navigator.clipboard.writeText(shareText()).then(function(){flash("dnCopy","Đã copy")})}
  function share(){var text=shareText(),url=location.href.split("#")[0]+"#loi-chua-"+fmt(sel),title="Lời Chúa hằng ngày - "+fmt(sel);if(navigator.share){navigator.share({title:title,text:text,url:url}).catch(function(){});return}var u=encodeURIComponent(url),t=encodeURIComponent(title+"\n"+text);$("dnFb").href="https://www.facebook.com/sharer/sharer.php?u="+u;$("dnZalo").href="https://zalo.me/share?u="+u;$("dnTelegram").href="https://t.me/share/url?url="+u+"&text="+t;$("dnX").href="https://twitter.com/intent/tweet?url="+u+"&text="+t;$("dnEmail").href="mailto:?subject="+encodeURIComponent(title)+"&body="+t;$("dnShareMenu").classList.toggle("on")}
  function flash(id,t){var b=$(id),o=b.textContent;b.textContent=t;setTimeout(function(){b.textContent=o},1200)}
  function loadFs(){var x=14.2;try{x=Number(localStorage.getItem("dn_lc_reading_font_size")||14.2)}catch(e){}return x<12||x>22?14.2:x} function applyFs(){document.getElementById("dnLcCompact").style.setProperty("--fs",fs+"px");try{localStorage.setItem("dn_lc_reading_font_size",String(fs))}catch(e){}} function chFs(d){fs=Math.max(12,Math.min(22,fs+d));applyFs()}
  function load(){var id=++req,k=fmt(sel);renderCal();$("dnReadings").innerHTML='<div class="dn-state">Đang tải dữ liệu...</div>';feast(null);fetchDay(k).then(function(d){if(id!==req)return;feast(d);renderReadings(d)}).catch(function(){if(id!==req)return;feast(null);$("dnReadings").innerHTML='<div class="dn-state">Dữ liệu đang được cập nhật.</div>'})}
  function init(){applyFs();$("dnDate").value=fmt(sel);$("dnDate").onchange=function(){sel=parse(this.value);view=new Date(sel.getFullYear(),sel.getMonth(),1);load()};$("dnToday").onclick=function(){sel=sod(new Date());view=new Date(sel.getFullYear(),sel.getMonth(),1);$("dnDate").value=fmt(sel);load()};$("dnPrev").onclick=function(){view=new Date(view.getFullYear(),view.getMonth()-1,1);renderCal()};$("dnNext").onclick=function(){view=new Date(view.getFullYear(),view.getMonth()+1,1);renderCal()};$("dnCopy").onclick=copy;$("dnShare").onclick=share;$("dnPrint").onclick=function(){window.print()};$("dnMinus").onclick=function(){chFs(-1)};$("dnPlus").onclick=function(){chFs(1)};load()}

</script>
